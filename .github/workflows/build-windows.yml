name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - gui-develop

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build GUI executable
        run: |
          pyinstaller --clean --onedir --windowed --collect-all playwright --name vpn-link-gui app_gui.py

      - name: Add run script
        shell: pwsh
        run: |
          @"
          @echo off
          start "" "%~dp0vpn-link-gui.exe"
          "@ | Set-Content -Path "dist\vpn-link-gui\run-gui.bat" -Encoding ASCII

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpn-link-gui-windows
          path: dist/vpn-link-gui
